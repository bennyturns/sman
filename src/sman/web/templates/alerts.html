{% extends "base.html" %}

{% block content %}
<div class="card">
    <h3>Alert History</h3>
    <div id="alert-list"
         hx-get="/api/alerts"
         hx-trigger="load, every 10s"
         hx-swap="innerHTML">
        <div style="padding: 20px; text-align: center; color: var(--text-dim);">
            <div class="spinner"></div>
            Loading alerts...
        </div>
    </div>
</div>
<div style="margin-top: 12px; font-size: 11px; color: var(--text-dim);">
    Alerts are stored at <code style="color: var(--blue);">~/.local/share/sman/alerts.log</code> — view with <code style="color: var(--blue);">cat ~/.local/share/sman/alerts.log | python3 -m json.tool</code>
</div>
{% endblock %}
